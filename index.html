<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Mídia Referência — Logotipo Responsivo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --surface-elevated: #1a1d2b;
      --border: #252a3a;
      --accent: #f5c542;
      --text: #f0f2f5;
      --text-muted: #8a8f9f;
      --danger: #ff5e5e;
      --shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    /* Header responsivo */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 56px;
      background: rgba(17,19,24,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 1rem;
    }
    .brand-icon {
      background: var(--accent);
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
    .brand-text {
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* Main layout responsivo */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      flex-direction: row;
    }

    /* Sidebar: em desktop largura fixa, em mobile vira painel inferior com scroll */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    /* Canvas area responsiva com rolagem suave */
    .canvas-area {
      flex: 1;
      background: #050608;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    .canvas-wrap {
      position: relative;
      display: inline-block;
      box-shadow: var(--shadow);
      border-radius: 12px;
      margin: 16px;
    }
    canvas {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: calc(100vh - 120px);
      object-fit: contain;
      cursor: grab;
      background: #0f1012;
      border-radius: 8px;
    }
    canvas:active { cursor: grabbing; }

    /* Ajustes para mobile */
    @media (max-width: 700px) {
      .main-layout {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        max-height: 38vh;
        border-right: none;
        border-top: 1px solid var(--border);
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        gap: 8px;
        padding: 8px;
        background: var(--surface);
      }
      .panel-section {
        min-width: 260px;
        border-bottom: none;
        border-right: 1px solid var(--border);
        padding: 12px;
      }
      .panel-section:last-child {
        border-right: none;
      }
      .header-actions .btn span {
        display: inline;
      }
      .btn {
        padding: 6px 12px;
        font-size: 0.7rem;
      }
      .thumb-list {
        max-height: 100px;
        flex-direction: row;
        overflow-x: auto;
      }
      .thumb-item {
        min-width: 80px;
        flex-direction: column;
        text-align: center;
      }
      .thumb-item img {
        width: 60px;
        height: 60px;
      }
    }

    /* Estilos dos componentes (mantidos) */
    .panel-section { padding: 16px; border-bottom: 1px solid var(--border); }
    .panel-section h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px; }
    .upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 12px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.02); margin-bottom: 8px; }
    .upload-zone:hover { border-color: var(--accent); }
    .thumb-list { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 4px; }
    .thumb-item { background: var(--surface-elevated); border-radius: 8px; padding: 6px; cursor: pointer; border: 1px solid transparent; min-width: 70px; text-align: center; }
    .thumb-item.active { border-color: var(--accent); background: rgba(245,197,66,0.1); }
    .thumb-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; margin-bottom: 4px; }
    .thumb-info { font-size: 0.65rem; overflow: hidden; text-overflow: ellipsis; }
    .remove-photo { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; margin-top: 4px; }
    .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .slider-row label { width: 60px; font-size: 0.75rem; }
    input[type="range"] { flex: 1; height: 4px; -webkit-appearance: none; background: var(--border); border-radius: 4px; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; }
    .val { width: 35px; text-align: right; font-size: 0.7rem; color: var(--accent); }
    .flex-buttons { display: flex; gap: 8px; margin-bottom: 12px; }
    .icon-btn { background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 8px; padding: 6px; flex: 1; text-align: center; cursor: pointer; font-size: 0.7rem; }
    .icon-btn.active { background: var(--accent); color: #0a0c10; }
    select { background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 8px; padding: 8px; width: 100%; color: var(--text); margin-bottom: 8px; font-size: 0.75rem; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 40px; font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; background: transparent; }
    .btn-primary { background: var(--accent); color: #0a0c10; }
    .btn-secondary { border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: rgba(255,94,94,0.15); color: #ff8a8a; border: 1px solid rgba(255,94,94,0.3); }
    .btn-full { width: 100%; justify-content: center; margin-bottom: 6px; }
    .key-hint { font-size: 0.6rem; color: var(--text-muted); text-align: center; margin-top: 8px; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e2a1f; color: #b9f5c0; padding: 8px 16px; border-radius: 40px; font-size: 0.75rem; transition: transform 0.2s; z-index: 2000; pointer-events: none; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .empty-state { text-align: center; color: var(--text-muted); padding: 20px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="brand"><div class="brand-icon">M</div><div class="brand-text">Mídia Referência</div></div>
    <div class="header-actions">
      <button class="btn btn-secondary" id="prevBtn">◀</button>
      <span id="imgCounter">—</span>
      <button class="btn btn-secondary" id="nextBtn">▶</button>
      <button class="btn btn-secondary" id="clearBtn">🗑</button>
      <button class="btn btn-primary" id="downloadCurrentBtn">⬇ Esta</button>
      <button class="btn btn-primary" id="downloadAllBtn">📁 Todas</button>
    </div>
  </div>
  <div class="main-layout">
    <aside class="sidebar" id="sidebar">
      <!-- Fotos -->
      <div class="panel-section">
        <h3>📸 FOTOS</h3>
        <div class="upload-zone" id="photosZone">
          <input type="file" id="photosInput" accept="image/*" multiple style="display:none">
          <div>➕ Adicionar fotos</div>
        </div>
        <div id="thumbList" class="thumb-list"></div>
      </div>
      <!-- Logotipo -->
      <div class="panel-section">
        <h3>🏷️ LOGOTIPO</h3>
        <div class="upload-zone" id="logoZone">
          <input type="file" id="logoInput" accept="image/*" style="display:none">
          <div id="logoPreviewWrap">⬆️ Carregar logo</div>
        </div>
        <button id="removeLogoBtn" class="btn btn-danger btn-full">🗑 Remover</button>
      </div>
      <!-- Escala e opacidade -->
      <div class="panel-section">
        <h3>⚙️ AJUSTES</h3>
        <div class="slider-row"><label>Tamanho</label><input type="range" id="sizeSlider" min="5" max="80" value="22"><span id="sizeVal" class="val">22%</span></div>
        <div class="slider-row"><label>Opacidade</label><input type="range" id="opacitySlider" min="20" max="100" value="92"><span id="opacityVal" class="val">92%</span></div>
      </div>
      <!-- Transformações -->
      <div class="panel-section">
        <h3>🔄 TRANSFORMAÇÕES</h3>
        <div class="slider-row"><label>Rotação</label><input type="range" id="rotationSlider" min="-180" max="180" value="0"><span id="rotationVal" class="val">0°</span></div>
        <div class="flex-buttons"><button id="flipHBtn" class="icon-btn">Espelhar H</button><button id="flipVBtn" class="icon-btn">Espelhar V</button></div>
        <button id="resetTransformBtn" class="btn btn-secondary btn-full">Reset transformações</button>
      </div>
      <!-- Blend e sombra -->
      <div class="panel-section">
        <h3>🎨 BLEND & SOMBRA</h3>
        <select id="blendModeSelect"><option value="normal">Normal</option><option value="multiply">Multiplicar</option><option value="screen">Tela</option><option value="overlay">Sobrepor</option></select>
        <div class="slider-row"><label>Sombra</label><input type="range" id="shadowSlider" min="0" max="20" value="0" step="0.5"><span id="shadowVal" class="val">0px</span></div>
      </div>
      <!-- Posição livre -->
      <div class="panel-section">
        <h3>📍 POSIÇÃO</h3>
        <div class="flex-buttons"><button id="centerLogoBtn" class="icon-btn">Centralizar</button><button id="resetPosBtn" class="icon-btn">Canto inferior dir.</button></div>
        <div class="key-hint">⬅️ ➡️ ⬆️ ⬇️ mover | Shift + seta rápido</div>
        <div class="key-hint">👆 Arraste direto na imagem</div>
      </div>
    </aside>

    <div class="canvas-area" id="canvasArea">
      <div class="canvas-wrap">
        <canvas id="mainCanvas"></canvas>
      </div>
      <div class="empty-state" id="emptyState">📂 Adicione fotos e um logotipo</div>
    </div>
  </div>
</div>
<div id="toast" class="toast">✅ OK</div>

<script>
  // Estado responsivo (configurações globais)
  let photos = [];
  let currentIdx = 0;
  let logoImg = null;
  let logoUrl = null;

  let globalLogoSize = 22;
  let globalOpacity = 0.92;
  let globalRotation = 0;
  let globalFlipX = false;
  let globalFlipY = false;
  let globalShadowBlur = 0;
  let globalBlendMode = 'normal';
  let globalPosX = 0.97;
  let globalPosY = 0.97;

  let dragging = false, dragStartX = 0, dragStartY = 0, dragBaseX = 0, dragBaseY = 0;

  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');

  // Ajudantes
  function showToast(msg, err = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.background = err ? '#3c1e1e' : '#1e2a1f';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function loadImage(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = url;
    });
  }

  function getLogoDimensions(canvasW) {
    const lw = canvasW * (globalLogoSize / 100);
    const lh = logoImg ? (logoImg.naturalHeight / logoImg.naturalWidth) * lw : 0;
    return { lw, lh };
  }

  // Desenho responsivo: canvas com tamanho nativo da foto, mas CSS limita exibição
  function drawCurrent() {
    if (!photos.length) {
      canvas.width = 10; canvas.height = 10;
      document.getElementById('emptyState').style.display = 'flex';
      return;
    }
    document.getElementById('emptyState').style.display = 'none';
    const photo = photos[currentIdx];
    if (!photo.img) return;

    canvas.width = photo.img.naturalWidth;
    canvas.height = photo.img.naturalHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(photo.img, 0, 0);

    if (!logoImg) return;

    const { lw, lh } = getLogoDimensions(canvas.width);
    const lx = globalPosX * canvas.width;
    const ly = globalPosY * canvas.height;

    ctx.save();
    ctx.globalAlpha = globalOpacity;
    ctx.globalCompositeOperation = globalBlendMode;
    if (globalShadowBlur > 0) {
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = globalShadowBlur;
      ctx.shadowOffsetX = globalShadowBlur * 0.3;
      ctx.shadowOffsetY = globalShadowBlur * 0.3;
    }
    ctx.translate(lx, ly);
    ctx.rotate(globalRotation * Math.PI / 180);
    ctx.scale(globalFlipX ? -1 : 1, globalFlipY ? -1 : 1);
    ctx.drawImage(logoImg, -lw/2, -lh/2, lw, lh);
    ctx.restore();
  }

  // UI Thumbs responsiva (scroll horizontal em mobile)
  function updateThumbsAndCounter() {
    const list = document.getElementById('thumbList');
    list.innerHTML = '';
    document.getElementById('photosCount')?.remove(); // não usado
    photos.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = `thumb-item ${i === currentIdx ? 'active' : ''}`;
      div.innerHTML = `<img src="${p.url}" /><div class="thumb-info">${p.name.substring(0,12)}</div><button class="remove-photo" data-i="${i}">✕</button>`;
      div.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-photo')) return;
        currentIdx = i;
        updateThumbsAndCounter();
        drawCurrent();
      });
      div.querySelector('.remove-photo').addEventListener('click', (e) => {
        e.stopPropagation();
        removePhoto(i);
      });
      list.appendChild(div);
    });
    document.getElementById('imgCounter').innerText = photos.length ? `${currentIdx+1}/${photos.length}` : '0';
  }

  function removePhoto(i) {
    URL.revokeObjectURL(photos[i].url);
    photos.splice(i, 1);
    if (photos.length === 0) currentIdx = 0;
    else if (currentIdx >= photos.length) currentIdx = photos.length - 1;
    drawCurrent();
    updateThumbsAndCounter();
  }

  function syncUI() {
    document.getElementById('sizeSlider').value = globalLogoSize;
    document.getElementById('sizeVal').innerText = globalLogoSize + '%';
    document.getElementById('opacitySlider').value = globalOpacity * 100;
    document.getElementById('opacityVal').innerText = Math.round(globalOpacity * 100) + '%';
    document.getElementById('rotationSlider').value = globalRotation;
    document.getElementById('rotationVal').innerText = globalRotation + '°';
    document.getElementById('flipHBtn').classList.toggle('active', globalFlipX);
    document.getElementById('flipVBtn').classList.toggle('active', globalFlipY);
    document.getElementById('shadowSlider').value = globalShadowBlur;
    document.getElementById('shadowVal').innerText = globalShadowBlur + 'px';
    document.getElementById('blendModeSelect').value = globalBlendMode;
  }

  function updateGlobal(updates) {
    if ('globalLogoSize' in updates) globalLogoSize = updates.globalLogoSize;
    if ('globalOpacity' in updates) globalOpacity = updates.globalOpacity;
    if ('globalRotation' in updates) globalRotation = updates.globalRotation;
    if ('globalFlipX' in updates) globalFlipX = updates.globalFlipX;
    if ('globalFlipY' in updates) globalFlipY = updates.globalFlipY;
    if ('globalShadowBlur' in updates) globalShadowBlur = updates.globalShadowBlur;
    if ('globalBlendMode' in updates) globalBlendMode = updates.globalBlendMode;
    if ('globalPosX' in updates) globalPosX = updates.globalPosX;
    if ('globalPosY' in updates) globalPosY = updates.globalPosY;
    drawCurrent();
    syncUI();
  }

  async function addPhotos(files) {
    for (const f of files) {
      if (!f.type.startsWith('image/')) continue;
      const url = URL.createObjectURL(f);
      try {
        const img = await loadImage(url);
        photos.push({ file: f, url, img, name: f.name, mime: f.type });
        currentIdx = photos.length - 1;
      } catch(e) {}
    }
    updateThumbsAndCounter();
    drawCurrent();
  }

  async function setLogo(file) {
    if (logoUrl) URL.revokeObjectURL(logoUrl);
    const url = URL.createObjectURL(file);
    try {
      const img = await loadImage(url);
      logoImg = img;
      logoUrl = url;
      document.getElementById('logoPreviewWrap').innerHTML = `<img src="${url}" style="max-height:50px; border-radius:6px;" />`;
      drawCurrent();
      showToast('Logotipo carregado');
    } catch(e) { showToast('Erro', true); }
  }

  function removeLogo() {
    if (logoUrl) URL.revokeObjectURL(logoUrl);
    logoImg = null;
    logoUrl = null;
    document.getElementById('logoPreviewWrap').innerHTML = '⬆️ Carregar logo';
    drawCurrent();
  }

  async function exportPhoto(photo, idx) {
    return new Promise(resolve => {
      const offCanvas = document.createElement('canvas');
      const offCtx = offCanvas.getContext('2d');
      offCanvas.width = photo.img.naturalWidth;
      offCanvas.height = photo.img.naturalHeight;
      offCtx.drawImage(photo.img, 0, 0);
      if (logoImg) {
        const { lw, lh } = getLogoDimensions(offCanvas.width);
        const lx = globalPosX * offCanvas.width;
        const ly = globalPosY * offCanvas.height;
        offCtx.save();
        offCtx.globalAlpha = globalOpacity;
        offCtx.globalCompositeOperation = globalBlendMode;
        if (globalShadowBlur > 0) {
          offCtx.shadowColor = 'rgba(0,0,0,0.5)';
          offCtx.shadowBlur = globalShadowBlur;
          offCtx.shadowOffsetX = globalShadowBlur * 0.3;
          offCtx.shadowOffsetY = globalShadowBlur * 0.3;
        }
        offCtx.translate(lx, ly);
        offCtx.rotate(globalRotation * Math.PI / 180);
        offCtx.scale(globalFlipX ? -1 : 1, globalFlipY ? -1 : 1);
        offCtx.drawImage(logoImg, -lw/2, -lh/2, lw, lh);
        offCtx.restore();
      }
      const isJpeg = photo.name.match(/\.jpe?g$/i) || photo.mime === 'image/jpeg';
      const mime = isJpeg ? 'image/jpeg' : 'image/png';
      offCanvas.toBlob(blob => {
        const a = document.createElement('a');
        a.download = `midia_${photo.name.replace(/\.[^/.]+$/, '')}.${isJpeg ? 'jpg' : 'png'}`;
        a.href = URL.createObjectURL(blob);
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);
        resolve();
      }, mime, isJpeg ? 0.92 : undefined);
    });
  }

  async function downloadAll() {
    if (!photos.length) return showToast('Nenhuma foto', true);
    showToast(`Exportando ${photos.length}...`);
    for (let i = 0; i < photos.length; i++) {
      await exportPhoto(photos[i], i);
      await new Promise(r => setTimeout(r, 100));
    }
    showToast('Concluído!');
  }

  // Eventos
  document.getElementById('photosZone').addEventListener('click', () => document.getElementById('photosInput').click());
  document.getElementById('photosInput').addEventListener('change', e => addPhotos(Array.from(e.target.files)));
  document.getElementById('photosZone').addEventListener('dragover', e => e.preventDefault());
  document.getElementById('photosZone').addEventListener('drop', e => {
    e.preventDefault();
    addPhotos(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
  });

  document.getElementById('logoZone').addEventListener('click', () => document.getElementById('logoInput').click());
  document.getElementById('logoInput').addEventListener('change', e => e.target.files[0] && setLogo(e.target.files[0]));
  document.getElementById('logoZone').addEventListener('dragover', e => e.preventDefault());
  document.getElementById('logoZone').addEventListener('drop', async e => {
    e.preventDefault();
    const file = Array.from(e.dataTransfer.files).find(f => f.type.startsWith('image/'));
    if (file) setLogo(file);
  });
  document.getElementById('removeLogoBtn').addEventListener('click', removeLogo);

  document.getElementById('sizeSlider').addEventListener('input', e => updateGlobal({ globalLogoSize: parseInt(e.target.value) }));
  document.getElementById('opacitySlider').addEventListener('input', e => updateGlobal({ globalOpacity: parseInt(e.target.value) / 100 }));
  document.getElementById('rotationSlider').addEventListener('input', e => updateGlobal({ globalRotation: parseInt(e.target.value) }));
  document.getElementById('flipHBtn').addEventListener('click', () => updateGlobal({ globalFlipX: !globalFlipX }));
  document.getElementById('flipVBtn').addEventListener('click', () => updateGlobal({ globalFlipY: !globalFlipY }));
  document.getElementById('shadowSlider').addEventListener('input', e => updateGlobal({ globalShadowBlur: parseFloat(e.target.value) }));
  document.getElementById('blendModeSelect').addEventListener('change', e => updateGlobal({ globalBlendMode: e.target.value }));
  document.getElementById('resetTransformBtn').addEventListener('click', () => updateGlobal({ globalRotation: 0, globalFlipX: false, globalFlipY: false, globalShadowBlur: 0, globalBlendMode: 'normal' }));
  document.getElementById('centerLogoBtn').addEventListener('click', () => updateGlobal({ globalPosX: 0.5, globalPosY: 0.5 }));
  document.getElementById('resetPosBtn').addEventListener('click', () => updateGlobal({ globalPosX: 0.97, globalPosY: 0.97 }));

  document.getElementById('prevBtn').addEventListener('click', () => { if(photos.length) { currentIdx = (currentIdx-1+photos.length)%photos.length; updateThumbsAndCounter(); drawCurrent(); } });
  document.getElementById('nextBtn').addEventListener('click', () => { if(photos.length) { currentIdx = (currentIdx+1)%photos.length; updateThumbsAndCounter(); drawCurrent(); } });
  document.getElementById('clearBtn').addEventListener('click', () => { if(confirm('Remover todas as fotos?')) { photos.forEach(p=>URL.revokeObjectURL(p.url)); photos=[]; currentIdx=0; updateThumbsAndCounter(); drawCurrent(); } });
  document.getElementById('downloadCurrentBtn').addEventListener('click', async () => { if(photos.length) { await exportPhoto(photos[currentIdx], currentIdx); showToast('Baixada'); } });
  document.getElementById('downloadAllBtn').addEventListener('click', downloadAll);

  // Arrasto responsivo (mouse e touch)
  function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : null);
    const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : null);
    if (!clientX) return null;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  }

  function onDragStart(e) {
    if (!photos.length || !logoImg) return;
    const coords = getCanvasCoords(e);
    if (!coords) return;
    const nx = coords.x / canvas.width;
    const ny = coords.y / canvas.height;
    const { lw, lh } = getLogoDimensions(canvas.width);
    const lx = globalPosX * canvas.width;
    const ly = globalPosY * canvas.height;
    if (Math.abs(coords.x - lx) <= lw/2 && Math.abs(coords.y - ly) <= lh/2) {
      dragging = true;
      dragBaseX = globalPosX;
      dragBaseY = globalPosY;
      dragStartX = nx;
      dragStartY = ny;
      canvas.style.cursor = 'grabbing';
      e.preventDefault();
    }
  }
  function onDragMove(e) {
    if (!dragging || !photos.length) return;
    const coords = getCanvasCoords(e);
    if (!coords) return;
    const deltaX = coords.x / canvas.width - dragStartX;
    const deltaY = coords.y / canvas.height - dragStartY;
    updateGlobal({ globalPosX: dragBaseX + deltaX, globalPosY: dragBaseY + deltaY });
    e.preventDefault();
  }
  function onDragEnd() { dragging = false; canvas.style.cursor = 'grab'; }
  canvas.addEventListener('mousedown', onDragStart);
  window.addEventListener('mousemove', onDragMove);
  window.addEventListener('mouseup', onDragEnd);
  canvas.addEventListener('touchstart', onDragStart, { passive: false });
  window.addEventListener('touchmove', onDragMove, { passive: false });
  window.addEventListener('touchend', onDragEnd);

  window.addEventListener('keydown', (e) => {
    if (!photos.length || !logoImg) return;
    const step = e.shiftKey ? 0.02 : 0.006;
    let dx = 0, dy = 0;
    if (e.key === 'ArrowLeft') dx = -step;
    else if (e.key === 'ArrowRight') dx = step;
    else if (e.key === 'ArrowUp') dy = -step;
    else if (e.key === 'ArrowDown') dy = step;
    else return;
    e.preventDefault();
    updateGlobal({ globalPosX: globalPosX + dx, globalPosY: globalPosY + dy });
  });

  // Responsividade: redesenha se necessário ao redimensionar (já está ok, mas força redraw)
  window.addEventListener('resize', () => { drawCurrent(); });

  syncUI();
  updateThumbsAndCounter();
  drawCurrent();
</script>
